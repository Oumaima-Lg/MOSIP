# Slot generation cron - every day at midnight by default
# Override to run every 2 minutes for testing
mosip.batch.slot.creation.cron=0 */2 * * * *
mosip.batch.appointment.mismatch.cron=0 */5 * * * *
mosip.batch.expired.status.cron=0 */5 * * * *

# Number of days to generate slots for (from today)
mosip.batch.token.validity=30
mosip.batch.slot.creation.task.number-of-days-to-add=14

# Pre-reg service URL for batchjob callbacks  
mosip.preregistration.booking.service.url=http://pre-registration-booking-service:9095
